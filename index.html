<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 italic tracking-tighter">UNI-DASH LOGIN</h1>
        <div id="loader" class="loader mx-auto mb-4"></div>
        <button id="btn-login" class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition flex items-center justify-center mx-auto">
            <i class="fab fa-google mr-2"></i> Sign in with Google
        </button>
        <p id="msg" class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIG KHUSUS AUTH (JANGAN DIUBAH)
        const firebaseConfig = {
            apiKey: "AIzaSyC7Kowl_t-GyiJCNZI5xVclGgIEvp6i5zo",
            authDomain: "loginsistemdashboard.firebaseapp.com",
            projectId: "loginsistemdashboard"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const btn = document.getElementById('btn-login');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');

        // CEK APAKAH SUDAH LOGIN
        onAuthStateChanged(auth, (user) => {
            if (user) {
                msg.innerText = "AUTHENTICATED: REDIRECTING...";
                window.location.replace("https://danendra24.github.io/dashboardiot-v2/");
            }
        });

        // ACTION LOGIN
        btn.onclick = async () => {
            btn.style.display = "none";
            loader.style.display = "block";
            msg.innerText = "OPENING GOOGLE LOGIN...";

            try {
                // Gue ganti ke Popup biar lebih stabil di GitHub Pages
                const result = await signInWithPopup(auth, provider);
                if (result.user) {
                    msg.innerText = "SUCCESS! REDIRECTING...";
                    window.location.replace("https://danendra24.github.io/dashboardiot-v2/");
                }
            } catch (error) {
                console.error(error);
                btn.style.display = "block";
                loader.style.display = "none";
                msg.innerText = "ERROR: " + error.code;
                alert("Login Gagal: " + error.message);
            }
        };
    </script>
</body>
</html>
