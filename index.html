<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UNI-DASH System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="glass-card p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div class="text-indigo-500 text-5xl mb-6"><i class="fas fa-shield-halved"></i></div>
        <h1 class="text-2xl font-black text-white tracking-tighter mb-2">UNI-DASH AUTH</h1>
        <p class="text-slate-400 text-sm mb-8">Silahkan login dengan Google untuk akses Dashboard IoT</p>
        
        <button id="btn-login" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold py-3 px-6 rounded-xl transition flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            Sign in with Google
        </button>

        <div id="status" class="mt-4 text-xs text-red-500 font-medium"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7Kowl_t-GyiJCNZI5xVclGgIEvp6i5zo",
            authDomain: "loginsistemdashboard.firebaseapp.com",
            databaseURL: "https://loginsistemdashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "loginsistemdashboard",
            storageBucket: "loginsistemdashboard.firebasestorage.app",
            messagingSenderId: "600029832092",
            appId: "1:600029832092:web:f8bdd90b63dc509c2f5e59",
            measurementId: "G-6DG4JR96HK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Redirect ke dashboard lu setelah login berhasil
                    window.location.href = "https://danendra24.github.io/dashboardiot-v2/";
                }).catch((error) => {
                    document.getElementById('status').innerText = "Login Gagal: " + error.message;
                });
        });
    </script>
</body>
</html>
