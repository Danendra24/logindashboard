<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl w-80">
        <h1 class="text-2xl font-black mb-6 italic tracking-tighter text-indigo-500">UNI-DASH</h1>
        <div id="loader" class="loader mx-auto mb-4"></div>
        
        <div id="login-area">
            <button id="btn-login" class="w-full bg-white text-black px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition flex items-center justify-center shadow-lg">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3">
                Sign in with Google
            </button>
        </div>

        <p id="msg" class="mt-4 text-[9px] text-slate-500 uppercase tracking-widest font-bold"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7Kowl_t-GyiJCNZI5xVclGgIEvp6i5zo",
            authDomain: "loginsistemdashboard.firebaseapp.com",
            projectId: "loginsistemdashboard"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // Pakai prompt 'select_account' supaya dia maksa nampilin list Gmail
        provider.setCustomParameters({ prompt: 'select_account' });

        const btn = document.getElementById('btn-login');
        const loader = document.getElementById('loader');
        const msg = document.getElementById('msg');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                msg.innerText = "ALREADY LOGGED IN. REDIRECTING...";
                setTimeout(() => {
                    window.location.replace("https://danendra24.github.io/dashboardiot-v2/");
                }, 500);
            }
        });

        btn.onclick = async () => {
            msg.innerText = "CHECKING POPUP...";
            loader.style.display = "block";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            try {
                // Set persistence dulu biar nggak ilang statusnya
                await setPersistence(auth, browserLocalPersistence);
                
                // Eksekusi Login
                const result = await signInWithPopup(auth, provider);
                if (result.user) {
                    msg.innerText = "SUCCESS! ENTERING DASHBOARD...";
                    window.location.replace("https://danendra24.github.io/dashboardiot-v2/");
                }
            } catch (error) {
                console.error("Login Error:", error);
                loader.style.display = "none";
                btn.style.opacity = "1";
                btn.disabled = false;

                if (error.code === 'auth/popup-blocked') {
                    msg.innerText = "POPUP BLOCKED! PLEASE ENABLE POPUPS.";
                    alert("Woi Cuk! Popup lu ke-block browser. Klik icon 'jendela' di kanan atas bar alamat browser lu, terus pilih 'Always allow popups'.");
                } else {
                    msg.innerText = "ERROR: " + error.code;
                    alert("Macet: " + error.message);
                }
            }
        };
    </script>
</body>
</html>
