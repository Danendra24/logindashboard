<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center p-10 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl">
        <h1 class="text-2xl font-bold mb-6">UNI-DASH LOGIN</h1>
        <div id="loader" class="loader mx-auto mb-4"></div>
        <button id="btn-login" class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition">
            Sign in with Google
        </button>
        <p id="msg" class="mt-4 text-xs text-slate-500 uppercase tracking-widest"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7Kowl_t-GyiJCNZI5xVclGgIEvp6i5zo",
            authDomain: "loginsistemdashboard.firebaseapp.com",
            projectId: "loginsistemdashboard"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 1. CEK HASIL REDIRECT PAS HALAMAN DIBUKA
        window.onload = async () => {
            const msg = document.getElementById('msg');
            try {
                const result = await getRedirectResult(auth);
                if (result?.user) {
                    msg.innerText = "LOGIN SUKSES, REDIRECTING...";
                    window.location.replace("https://danendra24.github.io/dashboardiot-v2/");
                }
            } catch (error) {
                console.error(error);
                msg.innerText = "ERROR: " + error.message;
            }
        };

        // 2. TOMBOL LOGIN DENGAN PERSISTENCE
        document.getElementById('btn-login').onclick = async () => {
            document.getElementById('loader').style.display = "block";
            document.getElementById('btn-login').style.display = "none";
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithRedirect(auth, provider);
            } catch (error) {
                alert(error.message);
                location.reload();
            }
        };
    </script>
</body>
</html>
